# 基本設定
title_zh: "中年阿賓の玩具"
title_en: "1stBenz's Toys"
title_de: "1stBenz' Spielzeuge"
title_es: "Juguetes de 1stBenz"
title_ja: "中年アビンの玩具"
# 這裡的 title 建議留一個作為全站預設（通常給 SEO 插件看）
title: "中年阿賓の玩具"
url: "https://1stbenz.github.io"
baseurl: ""

# 預設語系 (全站最頂層預設)
lang: zh-Hant
author: 
  name: 中年阿賓
  email: 1stbenz@github.com
description: "汽車技術筆記 | 保養改裝真相探究"
description_zh: "汽車技術筆記 | 保養改裝真相探究"
description_en: "Automotive Tech Notes | Maintenance & Tuning Facts"
description_de: "Automobile Tech-Notizen | Die Wahrheit über Wartung & Tuning"
description_es: "Notas de Tecnología Automotriz | La Verdad sobre el Mantenimiento y la Modificación"
description_ja: "自動車技術ノート | メンテナンスとカスタムの真相探究"

# 核心：自動根據資料夾路徑分配語言與 URL 前綴
defaults:
  # 1. 處理 zh 文章
  - scope:
      path: "_posts/zh"
    values:
      layout: "post"
      lang: "zh-Hant"
      permalink: /:year/:title:output_ext

  # 2. 處理 en 文章
  - scope:
      path: "_posts/en"
    values:
      layout: "post"
      lang: "en"
      permalink: /en/:year/:title:output_ext

  # 3. 處理 de 文章
  - scope:
      path: "_posts/de"
    values:
      layout: "post"
      lang: "de"
      permalink: /de/:year/:title:output_ext

  # 5. 處理 es 文章
  - scope:
      path: "_posts/es"
    values:
      layout: "post"
      lang: "es"
      permalink: /es/:year/:title:output_ext

  # 5.5. 處理 ja 文章
  - scope:
      path: "_posts/ja"
    values:
      layout: "post"
      lang: "ja"
      permalink: /ja/:year/:title:output_ext

  # 6. 處理各語系資料夾內的所有頁面
  - scope:
      path: "en"
    values:
      lang: "en"

  - scope:
      path: "de"
    values:
      lang: "de"

  - scope:
      path: "es"
    values:
      lang: "es"

  - scope:
      path: "ja"
    values:
      lang: "ja"

# 雙語導覽列 (與 header.html 邏輯對應)
nav_links:
  zh-Hant:
    - { title: "首頁", url: "/" }
    - { title: "關於", url: "/about/" }
  en:
    - { title: "Home", url: "/en/" }
    - { title: "About", url: "/en/about/" }
  de:
    - { title: "Startseite", url: "/de/" }
    - { title: "Über uns", url: "/de/about/" }
  es:
    - { title: "Inicio", url: "/es/" }
    - { title: "Sobre Mí", url: "/es/about/" }
  ja:
    - { title: "ホーム", url: "/ja/" }
    - { title: "について", url: "/ja/about/" }

# 編譯與外掛
markdown: kramdown
kramdown:
  math_engine: mathjax

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Sass compile settings
sass:
  style: compressed